<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강남사택 관리 · 총무용</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f4f1ea; --panel:#fbf9f4; --ink:#2b2b28; --muted:#7a766c;
    --line:#e0daccc; --line2:#d3ccbc; --accent:#3f6b4f; --accent2:#6b8e5a;
    --warn:#b5462f; --warnbg:#f6e3dd; --okbg:#e4ede0; --gold:#a8842c;
    --shadow:0 1px 3px rgba(60,50,30,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    font-size:15px;line-height:1.6;}
  header{background:var(--accent);color:#fdfcf8;padding:18px 22px;
    border-bottom:3px solid var(--gold);}
  header h1{margin:0;font-size:20px;font-weight:700;letter-spacing:-.3px;}
  header .sub{font-size:12.5px;opacity:.85;margin-top:3px;}
  nav{display:flex;flex-wrap:wrap;gap:2px;background:var(--panel);
    padding:8px 12px 0;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;}
  nav button{border:1px solid transparent;border-bottom:none;background:none;
    padding:9px 16px;font-size:14px;cursor:pointer;color:var(--muted);
    border-radius:8px 8px 0 0;font-family:inherit;font-weight:600;}
  nav button.active{background:var(--bg);color:var(--accent);
    border-color:var(--line);position:relative;top:1px;}
  nav button:hover:not(.active){color:var(--ink);}
  nav button.admin-only{color:var(--gold);}
  nav button.admin-only.active{color:var(--accent);}
  #adminBar{max-width:1080px;margin:0 auto;padding:10px 18px 0;display:flex;
    align-items:center;gap:12px;flex-wrap:wrap;}
  #adminBar button{cursor:pointer;color:#fff;background:var(--gold);border-radius:8px;border:none;
    padding:9px 18px;font-weight:700;font-size:14px;}
  #adminBar button:hover{background:#8c6d22;}
  #adminBar button.on{background:var(--accent);}
  #adminBar .note{margin:0;}
  body.public .admin-only{display:none;}
  .gas-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .gas-tab{cursor:pointer;border:1px solid var(--line2);background:var(--panel);
    border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--muted);}
  .gas-tab:hover{color:var(--ink);}
  .gas-tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .lockmsg{background:var(--warnbg);border:1px solid var(--warn);border-radius:12px;
    padding:24px;text-align:center;color:var(--warn);font-weight:600;}
  .lockmsg .key{font-size:30px;display:block;margin-bottom:8px;}
  .bldg-photos{display:flex;gap:16px;flex-wrap:wrap;}
  .bldg{flex:1;min-width:240px;margin:0;}
  .bldg img{width:100%;border-radius:10px;border:1px solid var(--line2);display:block;background:#eee;min-height:120px;}
  .bldg figcaption{text-align:center;font-size:13px;color:var(--muted);margin-top:6px;font-weight:600;}
  main{max-width:1080px;margin:0 auto;padding:22px 18px 60px;}
  .tab{display:none;}
  .tab.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow);}
  .card h2{margin:0 0 12px;font-size:17px;color:var(--accent);
    border-bottom:2px solid var(--line2);padding-bottom:8px;}
  .card h3{font-size:14.5px;margin:16px 0 6px;color:var(--ink);}
  .row{display:flex;flex-wrap:wrap;gap:10px 24px;}
  .field{flex:1;min-width:200px;}
  .label{font-size:12px;color:var(--muted);font-weight:600;}
  .val{font-size:15px;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th,td{border:1px solid var(--line2);padding:6px 9px;text-align:left;}
  th{background:var(--okbg);color:var(--accent);font-weight:700;}
  tr:nth-child(even) td{background:rgba(0,0,0,.015);}
  .btn{background:var(--accent);color:#fff;border:none;padding:9px 16px;
    border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;}
  .btn:hover{background:#345941;}
  .btn.sec{background:#fff;color:var(--accent);border:1px solid var(--accent);}
  .btn.sec:hover{background:var(--okbg);}
  .btn.sm{padding:4px 10px;font-size:12.5px;}
  .btn.danger{background:var(--warn);}
  input,select,textarea{font-family:inherit;font-size:14px;padding:6px 9px;
    border:1px solid var(--line2);border-radius:7px;background:#fff;}
  input:focus,textarea:focus{outline:2px solid var(--accent2);outline-offset:-1px;}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600;}
  .pill.ok{background:var(--okbg);color:var(--accent);}
  .pill.no{background:var(--warnbg);color:var(--warn);}
  .uploadzone{border:2px dashed var(--line2);border-radius:12px;padding:26px;
    text-align:center;color:var(--muted);cursor:pointer;background:#fff;}
  .uploadzone:hover{border-color:var(--accent2);background:var(--okbg);}
  .uploadzone.drag{border-color:var(--accent);background:var(--okbg);}
  .stat{display:flex;gap:14px;flex-wrap:wrap;}
  .statbox{flex:1;min-width:130px;background:#fff;border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;}
  .statbox .n{font-size:21px;font-weight:700;color:var(--accent);}
  .statbox.warn .n{color:var(--warn);}
  .statbox .t{font-size:12px;color:var(--muted);}
  .grid-pay{overflow-x:auto;}
  .grid-pay td.paid{background:var(--okbg);color:var(--accent);text-align:center;font-weight:700;}
  .grid-pay td.unpaid{background:var(--warnbg);color:var(--warn);text-align:center;}
  .grid-pay td.future{background:#f0eee7;color:#c5c0b3;text-align:center;}
  .grid-pay td.name{font-weight:600;white-space:nowrap;}
  .grid-pay th.sticky,.grid-pay td.sticky{position:sticky;left:0;background:var(--okbg);z-index:2;}
  .note{font-size:12.5px;color:var(--muted);}
  .infoblock{background:var(--okbg);border-left:4px solid var(--accent);
    padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:13.5px;}
  .warnblock{background:var(--warnbg);border-left:4px solid var(--warn);
    padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:13.5px;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .toolbar .spacer{flex:1;}
  ul.clean{padding-left:20px;margin:6px 0;}
  ul.clean li{margin:3px 0;}
  .tel{color:var(--accent);font-weight:600;text-decoration:none;}
  .checklist label{display:flex;gap:8px;align-items:flex-start;padding:5px 0;cursor:pointer;}
  .checklist input{margin-top:4px;}
  .notice-item{border:1px solid var(--line2);border-radius:9px;padding:10px 13px;
    margin-bottom:8px;background:#fff;}
  .notice-item .meta{font-size:11.5px;color:var(--muted);}
  .notice-item.pin{border-color:var(--gold);background:#fdfaf0;}
  .privacy-tag{font-size:11px;background:var(--gold);color:#fff;padding:2px 8px;border-radius:12px;}
  .mono{font-variant-numeric:tabular-nums;}
  details summary{cursor:pointer;font-weight:600;color:var(--accent);padding:4px 0;}
  @media(max-width:640px){
    main{padding:14px 10px 50px;} .card{padding:14px;}
    nav button{padding:8px 11px;font-size:13px;}
  }
</style>
</head>

<header>
  <h1>강남사택 관리 시스템</h1>
  <div class="sub">교직원 사택 총무용 · 경기도 양평군 강하면 동오3길 21 · 모든 데이터는 이 브라우저 안에서만 처리됩니다</div>
</header>
<div id="adminBar">
  <button id="adminBtn" type="button" onclick="toggleAdmin()">🔑 관리자 모드</button>
  <span id="adminStatus" class="note">공개 모드 — 누구나 볼 수 있는 정보만 표시됩니다</span>
  <span id="fbStatus" class="note" style="margin-left:auto">동기화: 연결 중…</span>
</div>
<nav id="nav">
  <button class="active" data-tab="info">입주·생활 안내</button>

  <button data-tab="gas">가스 검침</button>
  <button data-tab="unit">미납 세대 조회</button>
  <button data-tab="bankpub">입출금 현황</button>
  <button data-tab="notice">공지사항</button>
  <button class="admin-only" data-tab="bank">🔒 입출금 정리</button>
  <button class="admin-only" data-tab="fee">🔒 관리비 정산</button>
  <button class="admin-only" data-tab="data">🔒 입주자 명단</button>
</nav>

// ============ 데이터 저장 (브라우저 + 파이어베이스 동기화 + 파일 내보내기/가져오기) ============

  residents: {},        // {"1101":{name:"", since:""}}
  feeDeposits: {},      // {unit:[{date,months,rec,amt}]} 관리비 입금 이벤트 원본

const ADMIN_PW_KEY = 'gangnam_admin_pwhash';  // 변경된 비밀번호 해시 저장 키(기기 내부)
// 기본 관리자 비밀번호 해시(모든 기기 공통). 원래 비밀번호는 파일에 없음.
// 최초 비밀번호: changeme2026  → 첫 로그인 후 [입주자 명단] 탭에서 반드시 변경하세요.
const DEFAULT_PW_HASH = 'h7c9be347';
// 문자열 해시(간단한 방식) — 실제 비밀번호는 파일에 저장되지 않습니다
function pwHash(s){
  let h=5381; s=String(s);
  for(let i=0;i<s.length;i++){ h=((h<<5)+h+s.charCodeAt(i))>>>0; }
  return 'h'+h.toString(16);
}
// 현재 유효한 비밀번호 해시: 변경했으면 그 값(기기 또는 공유 데이터), 아니면 기본값
function currentPwHash(){
  try{ const s=localStorage.getItem(ADMIN_PW_KEY); if(s) return s; }catch(e){}
  if(typeof DB!=='undefined' && DB && DB.adminPwHash) return DB.adminPwHash;
  return DEFAULT_PW_HASH;
}

function promptAdmin(targetTab){
  const pw=prompt('관리자 비밀번호를 입력하세요');

  if(pwHash(pw)===currentPwHash()){

// 공개 모드 이름 익명 처리: 성만 남기고 가림 (예: 홍길동 → 홍**). 관리자 모드는 전체 표시
function dispName(name){
  if(!name) return '';
  if(ADMIN) return name;
  const n=String(name);
  if(n.length<=1) return '*';
  return n[0]+'*'.repeat(n.length-1);
}

// 거래메모/기록에서 동호수 추출 (1101~2999 형태)
function extractUnit(memo, rec){
  for(const s of [String(rec||''), String(memo||'')]){
    let m = s.match(/([12])\s*동?\s*(\d{3})\s*호?/);   // "1동305호","1 305"
    if(m) return m[1]+m[2];
    m = s.match(/\b([12]\d{3})\b/);                      // "1305"
    if(m) return m[1];
  }
  return null;
}
// 기록사항에서 이름 후보 추출 (한글 2~4자, 숫자/호/동 제외)
function extractName(rec){
  if(!rec) return '';
  let s = String(rec).replace(/[0-9]/g,'').replace(/[동호\-\/().,]/g,' ');
  s = s.replace(/강남사택|강남|관리비|보증금|월분|개월/g,' ');
  const m = s.match(/[가-힣]{2,4}/);
  return m ? m[0] : '';
}
// 관리비 외 지출/수입 키워드
const EXPENSE_KW = ['한전','하수도','반도에너지','인터넷상거래','네이버파이낸셜','다이소','농약','종묘','보증금 반환','반환','공용전기','공실','리모컨','TV'];
function classifyExpense(rec){
  const s=String(rec||'');
  if(/한전/.test(s))return '전기(한전)';
  if(/하수도/.test(s))return '하수도요금';
  if(/반도에너지|가스/.test(s))return '가스(반도에너지)';
  if(/반환/.test(s))return '보증금반환';
  if(/공용전기/.test(s))return '공용전기';
  if(/공실/.test(s))return '공실 정산';
  if(/네이버|다이소|상거래|농약|종묘|리모컨/.test(s))return '비품·기타';
  return '기타지출';
}

// ============ 통장 .xls/.xlsx 파싱 엔진 ============
function parseBankFile(arrayBuffer){
  const wb = XLSX.read(arrayBuffer, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false});
  // 헤더행 찾기: '거래일시' 포함 행
  let hi = rows.findIndex(r => r && r.some(c => String(c).includes('거래일시')));
  if(hi<0) throw new Error('거래내역 형식을 인식하지 못했습니다. 농협 입출금거래내역 엑셀인지 확인해주세요.');
  const header = rows[hi].map(c=>String(c||'').trim());
  const col = name => header.findIndex(h=>h.includes(name));
  const ci = {date:col('거래일시'), out:col('출금'), in:col('입금'),
              rec:col('거래기록'), memo:col('거래메모')};
  const out = [];
  for(let i=hi+1;i<rows.length;i++){
    const r = rows[i]; if(!r) continue;
    const date = String(r[ci.date]||'').trim();
    if(!/\d{4}[\/.\-]\d{2}[\/.\-]\d{2}/.test(date)) continue;
    const toNum = v => { const n=Number(String(v==null?'':v).replace(/[,원\s]/g,'')); return isNaN(n)?0:n; };
    out.push({
      date: date.slice(0,10).replace(/\./g,'/').replace(/-/g,'/'),
      inAmt: toNum(r[ci.in]), outAmt: toNum(r[ci.out]),
      rec: r[ci.rec]!=null?String(r[ci.rec]):'',
      memo: ci.memo>=0 && r[ci.memo]!=null?String(r[ci.memo]):''
    });
  }
  // 시작잔액 추출(통장잔액/거래후잔액 첫행 - 입금 + 출금) — 표시는 월별 누적으로 계산
  return out;
}

// 파싱된 거래를 DB에 반영
function ingestTransactions(txs){
  if(!DB.feeDeposits) DB.feeDeposits = {}; // {unit:[{date,months,rec}]}
  txs.forEach(t=>{
    const mk = monthKey(t.date);
    if(t.inAmt>0){
      const unit = extractUnit(t.memo, t.rec);
      if(unit && t.inAmt % 1000 === 0 && t.inAmt <= 400000){
        // 관리비/보증금 입금으로 추정
        let months = 0;
        const a = t.inAmt;
        // 27000 단위 관리비 계산 (보증금 100,000 동반 케이스 분리)
        if(a===100000){ months=0; } // 보증금만
        else if(a % FEE === 0){ months = a/FEE; }
        else if(a>100000 && (a-100000)%FEE===0){ months=(a-100000)/FEE; } // 보증금+관리비
        else { months = Math.round(a/FEE); } // 근사
        // 등록
        if(!DB.residents[unit]) DB.residents[unit]={name:extractName(t.rec)||'', since:mk};
        else if(!DB.residents[unit].name) DB.residents[unit].name=extractName(t.rec)||'';
        // 입금 이벤트로 수집 (배정은 allocatePayments에서 일괄 처리)
        if(months>0){
          if(!DB.feeDeposits[unit]) DB.feeDeposits[unit]=[];
          DB.feeDeposits[unit].push({date:t.date, months, rec:t.rec, amt:a});
        }
        // 기타수입 목록에도 (보증금 등)
        if(a===100000 || (a>100000 && months>0)){
          if(!DB.otherTx[mk])DB.otherTx[mk]=[];
          DB.otherTx[mk].push({date:t.date,type:'수입',desc:`${unit} ${months>0?'보증금+관리비':'보증금'}`,amount:a});
        }
      } else {
        // 관리비로 매칭 안되는 입금 (이자/할인 등)
        if(!DB.otherTx[mk])DB.otherTx[mk]=[];
        DB.otherTx[mk].push({date:t.date,type:'수입',desc:t.rec||'기타입금',amount:t.inAmt});
      }
    }
    if(t.outAmt>0){
      if(!DB.otherTx[mk])DB.otherTx[mk]=[];
      DB.otherTx[mk].push({date:t.date,type:'지출',desc:(classifyExpense(t.rec))+(t.rec?` · ${t.rec}`:''),amount:t.outAmt});
    }
    // 월별 수입/지출 합계
    if(!DB.monthlySummary[mk])DB.monthlySummary[mk]={income:0,expense:0};
    DB.monthlySummary[mk].income += t.inAmt;
    DB.monthlySummary[mk].expense += t.outAmt;
  });
  allocatePayments();
  computeBalances();
}

// 입금 이벤트를 '밀린 달부터' 배정. 자동 채운 칸은 status='back'으로 표시.
// 수동 보정(DB.manualOverrides)은 항상 우선.
function allocatePayments(){
  // 자동 배정 결과 초기화 (수동 보정은 보존)
  DB.payments = {};
  const ym = s => { const [y,m]=s.split('-').map(Number); return y*12+(m-1); };
  const myk = n => `${Math.floor(n/12)}-${String(n%12+1).padStart(2,'0')}`;
  const nowN = ym(curYM());

  // 0) 통장사본 기반 자동 납부(2024-09~현재) 먼저 채움 — 면제 세대는 제외
  //    BANK_PAY[월][동호수] = {status:'on'|'back'|'pre', date}
  Object.entries(BANK_PAY||{}).forEach(([mk,unitMap])=>{
    Object.entries(unitMap).forEach(([unit,info])=>{
      if(DB.residents[unit]?.exempt) return;
      if(!DB.payments[mk]) DB.payments[mk]={};
      DB.payments[mk][unit] = {months:1, status:info.status||'on', date:info.date, needdate:info.needdate};
    });
  });

  Object.keys(DB.feeDeposits||{}).forEach(unit=>{
    const deps = [...DB.feeDeposits[unit]].sort((a,b)=>a.date.localeCompare(b.date));
    const since = DB.residents[unit]?.since || monthKey(deps[0]?.date||curYM());
    let cursor = ym(since); // 배정 시작점: 입주월
    deps.forEach(dep=>{
      const depN = ym(monthKey(dep.date)); // 입금이 일어난 달
      for(let k=0;k<dep.months;k++){
        // 미배정 + 미납인 가장 오래된 달 찾기 (입주월부터)
        while(cursor<=Math.max(depN, nowN) && DB.payments[myk(cursor)]?.[unit]) cursor++;
        const key = myk(cursor);
        if(!DB.payments[key]) DB.payments[key]={};
        // 배정 시점이 입금 달보다 과거면 '밀린 납부(back)', 미래면 '선납(pre)', 같으면 '정상(on)'
        const st = cursor<depN ? 'back' : (cursor>depN ? 'pre' : 'on');
        DB.payments[key][unit] = {months:1, status:st, date:dep.date, rec:dep.rec};
        cursor++;
      }
    });
  });

  // 수동 보정 적용 (켜기/끄기)
  Object.entries(DB.manualOverrides||{}).forEach(([k,unitMap])=>{
    Object.entries(unitMap).forEach(([unit,on])=>{
      if(on){
        if(!DB.payments[k])DB.payments[k]={};
        DB.payments[k][unit]={months:1, status:'manual'};
      } else {
        if(DB.payments[k]) delete DB.payments[k][unit];
      }
    });
  });
}

// 전월잔액→잔액 누적 계산
function computeBalances(){
  const keys = Object.keys(DB.monthlySummary).sort();
  let running = null;
  keys.forEach(k=>{
    const s=DB.monthlySummary[k];
    const real = BANK_MONTHLY[k];
    if(real && real.prevBal!==undefined){
      // 통장 실제 거래후잔액 기준 — 항상 통장과 일치
      s.prevBal = real.prevBal;
      s.bal = (real.bal!==undefined) ? real.bal : (real.prevBal + s.income - s.expense);
    } else {
      // 통장에 없는 월(수기 추가 등): 직전 잔액 누적
      s.prevBal = (running!==null) ? running : (DB.startBalance||0);
      s.bal = s.prevBal + (s.income||0) - (s.expense||0);
    }
    running = s.bal;
  });
}

// ============ 렌더링: 관리비 정산 (핵심) ============
function ymNum(s){const[y,m]=s.split('-').map(Number);return y*12+(m-1);}
function ymKey(n){return `${Math.floor(n/12)}-${String(n%12+1).padStart(2,'0')}`;}
// 해당 세대가 그 달에 관리비 납부 의무가 있는지 (면제X, 적용시작월 이후, 현재월 이하)
function isDue(unit, m){
  const r=DB.residents[unit]; if(!r) return false;
  if(r.exempt) return false;
  const eff = r.since || LEDGER_START;
  return m>=eff && m<=curYM();
}
function effStart(unit){ return DB.residents[unit]?.since || LEDGER_START; }
function allMonths(){
  const set=new Set([...Object.keys(DB.payments),...Object.keys(DB.monthlySummary),...Object.keys(DB.otherTx)]);
  // 관리대장 적용 시작월 ~ 현재월까지 포함 (납부 의무 구간 표시용)
  let minN=ymNum(curYM());
  Object.keys(DB.residents).forEach(u=>{const e=effStart(u); if(e) minN=Math.min(minN,ymNum(e));});
  for(let n=minN;n<=ymNum(curYM());n++) set.add(ymKey(n));
  return [...set].filter(Boolean).sort();
}
function allUnits(){
  return Object.keys(DB.residents).sort();
}
// 정산 기준월: 통장 데이터가 있는 마지막 달까지만 (오늘이 그 이후여도 미도래로 처리)
function curYM(){
  const d=new Date();
  const today=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  // 통장(BANK_MONTHLY) 마지막 달과 비교해, 더 이른 쪽을 정산 기준월로 사용
  let last=today;
  try{
    const keys=Object.keys(BANK_MONTHLY||{}).sort();
    if(keys.length){ last=keys[keys.length-1]; }
  }catch(e){}
  return today<last ? today : last;
}

                if(p.status==='manual') return `<td class="paid" ${click} title="수동 납부 처리">✓${dot}</td>`;
                return `<td class="paid" ${click} title="정상 납부 (입금일 ${p.date?p.date.slice(5):''})">✓${dot}</td>`;
              }
              if(m>nowK) return `<td class="future" ${click}>–${dot}</td>`;
              return `<td class="unpaid" ${click}>✗${dot}</td>`;
            }).join('')+`</tr>`;
        }).join('')}
      </table></div>
      <p class="note">⚠✓ 는 밀린 달을 메운 납부, ▲✓ 는 선납입니다. '–'는 아직 도래하지 않은 달, '·'는 입주(적용 시작) 이전 달입니다. 노란 점(•)은 수동 보정한 칸입니다.</p>
    </div>`;

    // 기타 거래
    const otherMonths = Object.keys(DB.otherTx).sort();
    if(otherMonths.length){
      html += `<div class="card"><h2>④ 관리비 외 거래 (보증금·공과금·비품 등)</h2>`;
      otherMonths.forEach(m=>{
        const list=DB.otherTx[m]; if(!list.length)return;
        html+=`<details><summary>${m} (${list.length}건)</summary><table class="mono">
          <tr><th>날짜</th><th>구분</th><th>내용</th><th>금액</th></tr>
          ${list.map(t=>`<tr><td>${t.date.slice(5)}</td>
            <td><span class="pill ${t.type==='수입'?'ok':'no'}">${t.type}</span></td>
            <td>${esc(t.desc)}</td><td>${won(t.amount)}</td></tr>`).join('')}
        </table></details>`;
      });
      html+=`</div>`;
    }
  }
  document.getElementById('tab-fee').innerHTML = html;
  bindFeeUpload();
}

function setPayStatus(m,u,status){
  if(!ADMIN) return;
  if(!DB.manualOverrides) DB.manualOverrides={};
  if(!DB.manualOverrides[m]) DB.manualOverrides[m]={};
  if(status==='unpaid'){
    // 미납으로: 납부 기록 제거, 수동보정으로 '미납' 고정
    if(DB.payments[m]) delete DB.payments[m][u];
    DB.manualOverrides[m][u]=false;
  } else {
    const prevDate = DB.payments[m]?.[u]?.date || '';
    if(!DB.payments[m]) DB.payments[m]={};
    DB.payments[m][u]={months:1, status:status, date:prevDate, src:'manual'};
    DB.manualOverrides[m][u]=true;
  }
  persist();
  renderUnit();
}
function setPayDate(m,u,val){
  if(!ADMIN) return;
  val=(val||'').trim();
  // 타자 입력 보정: 2025.9.2 / 2025/09/02 / 20250902 → 2025-09-02
  if(val){
    let s=val.replace(/[.\/]/g,'-');
    let mm=s.match(/^(\d{4})-?(\d{1,2})-?(\d{1,2})$/);
    if(mm){ val=`${mm[1]}-${mm[2].padStart(2,'0')}-${mm[3].padStart(2,'0')}`; }
    else if(!/^\d{4}-\d{2}-\d{2}$/.test(val)){
      alert('입금일은 YYYY-MM-DD 형식으로 입력하세요. 예: 2025-09-02');
      return undefined;
    }
  }
  if(!DB.payments[m]) DB.payments[m]={};
  if(!DB.payments[m][u]) DB.payments[m][u]={months:1,status:'manual',src:'manual'};
  DB.payments[m][u].date = val;
  if(!DB.manualOverrides[m]) DB.manualOverrides[m]={};
  DB.manualOverrides[m][u] = true;  // 수기 보정 표시 → 저장/복원 시 유지
  persist();
  return val;   // 재렌더 없이 정규화된 값만 반환(입력칸 리셋 방지)
}
function viewUnit(u){ _selUnit=u; renderUnit(); goTab('unit'); }

let _seenTx = new Set();
function bindFeeUpload(){
  const drop=document.getElementById('dropFee'), inp=document.getElementById('feeFile');
  if(!drop)return;
  drop.onclick=()=>inp.click();
  ['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
  drop.addEventListener('drop',e=>handleFiles(e.dataTransfer.files));
  inp.onchange=()=>handleFiles(inp.files);
}
function handleFiles(files){
  const msg=document.getElementById('feeMsg');
  let done=0, added=0, errs=[];
  [...files].forEach(f=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const txs=parseBankFile(e.target.result);
        const fresh=txs.filter(t=>{const k=t.date+'|'+t.inAmt+'|'+t.outAmt+'|'+t.rec; if(_seenTx.has(k))return false; _seenTx.add(k); return true;});
        ingestTransactions(fresh);
        added+=fresh.length;
      }catch(err){ errs.push(f.name+': '+err.message); }
      if(++done===files.length){
        msg.innerHTML = `✅ ${added}건 반영${errs.length?' · ⚠️ '+errs.join(' / '):''}`;
        renderFee(); renderUnit();
      }
    };
    reader.readAsArrayBuffer(f);
  });
}
function togglePay(m,u){
  if(!DB.manualOverrides) DB.manualOverrides={};
  const currentlyPaid = !!DB.payments[m]?.[u];
  if(!DB.manualOverrides[m]) DB.manualOverrides[m]={};
  if(DB.manualOverrides[m][u]!==undefined){
    // 이미 수동 보정된 칸 → 보정 해제(자동 계산으로 복귀)
    delete DB.manualOverrides[m][u];
    if(!Object.keys(DB.manualOverrides[m]).length) delete DB.manualOverrides[m];
  } else {
    // 새로 보정: 현재 상태의 반대로 고정
    DB.manualOverrides[m][u] = !currentlyPaid;
  }
  allocatePayments();
  persist();
  renderFee(); renderUnit();
}

  downloadBlob(csv,'관리비_납부현황.csv','text/csv');
}

let _gasMonth = null;

  let html=`
  <div class="card">
    <h2>가스 검침 기록</h2>
    <div class="infoblock"><b>매월 말일 모든 세대 검침 결과 기록</b><br>

    </div>`;

  if(units.length){
    html+=`
    <h3 style="margin:14px 0 6px">${_gasMonth} 검침${prevM?` <span class="note">(직전 검침월: ${prevM} 대비 사용량 자동 계산)</span>`:' <span class="note">(첫 검침월이라 사용량은 다음 달부터 계산됩니다)</span>'}</h3>
    <table>
      <tr><th>동호수</th><th>이번 달 지침</th>${prevM?'<th>전월 지침</th><th>사용량</th>':''}</tr>

        return `<tr>
          <td class="name">${u}</td>

          ${prevM?`<td class="note">${pv===''?'-':pv}</td>
          <td>${use!=null?(use>=0?'<b>'+use+'</b>':'<span style="color:var(--warn)">확인필요</span>'):'-'}</td>`:''}
        </tr>`;
      }).join('')}
    </table>
    <p class="note">지침값을 입력하면 즉시 저장되고, 전월 대비 사용량이 자동 계산됩니다. 데이터는 사라지지 않습니다.</p>`;
  } else {
    html+=`<p class="note">세대 목록이 아직 없습니다.</p>`;
  }
  html+=`</div>`;
  document.getElementById('tab-gas').innerHTML=html;
  document.querySelectorAll('[data-gu]').forEach(inp=>inp.onchange=()=>{
    const u=inp.dataset.gu,m=inp.dataset.gm;
    if(!DB.gas[u])DB.gas[u]={};
    DB.gas[u][m]=inp.value;
    persist();
    renderGas();
  });

function setGasMonth(m){ _gasMonth=m; renderGas(); }
function addGasMonth(){
  const m=prompt('추가할 검침 월 (예: 2026-06)', curYM());
  if(m&&/^\d{4}-\d{2}$/.test(m)){
    allUnits().forEach(u=>{if(!DB.gas[u])DB.gas[u]={};if(!(m in DB.gas[u]))DB.gas[u][m]='';});
    if(allUnits().length===0){DB.gas['_']={[m]:''};} // 빈 상태에서도 월 유지
    _gasMonth=m;
    persist();
    renderGas();
  }
}

// ============ 저장/불러오기/내보내기 ============
function downloadBlob(content,name,type){
  // 다운로드를 강제하기 위해 octet-stream 사용 (뷰어로 열리지 않고 바로 저장)
  const blob=new Blob([content],{type:'application/octet-stream'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=name; a.rel='noopener'; a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },4000);
}
const STORAGE_KEY='gangnam_sataek_db_v1';
let _fbReady=false, _fbDoc=null, _fbApplying=false;
function persist(){
  // 1) 브라우저 로컬 저장 (오프라인·즉시)
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }
  catch(e){ /* 용량초과 등은 무시 */ }
  // 2) 파이어베이스 동기화 — ref가 준비되면 항상 전송(원격 반영 중 재전송만 차단)
  if(_fbDoc && !_fbApplying){
    try{ _fbDoc.set({ data: JSON.stringify(DB), updatedAt: Date.now() }); }
    catch(e){ /* 네트워크 오류는 무시(로컬은 이미 저장됨) */ }
  }
}
function loadPersisted(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(!s) return false;
    const o=JSON.parse(s);
    Object.keys(DB).forEach(k=>delete DB[k]);
    Object.assign(DB,o);
    return true;
  }catch(e){ return false; }
}
function saveData(){ persist(); downloadBlob(JSON.stringify(DB,null,2),`강남사택_데이터_${curYM()}.json`); }
function loadData(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{ try{ const o=JSON.parse(e.target.result);
    Object.keys(DB).forEach(k=>delete DB[k]);
    Object.assign(DB,o);
    if(!DB.feeDeposits)DB.feeDeposits={};
    if(!DB.manualOverrides)DB.manualOverrides={};
    if(!DB.expenseNotes)DB.expenseNotes={};
    if(typeof DB.startBalance!=='number')DB.startBalance=DB._startBalance||0;
    if(!DB.monthlySummary)DB.monthlySummary={};
    seedFromLedger();
    seedBankFinance();
    _seenTx=new Set();
    allocatePayments();
    computeBalances(); persist(); renderAll();
    alert('데이터를 불러왔습니다.');
  }catch(err){alert('파일을 읽을 수 없습니다: '+err.message);} };
  r.readAsText(file);
}
function exportAnonymous(){

  }));

function bindExpenseNotes(){
  if(!ADMIN) return; // 공개 모드는 보기 전용
  document.querySelectorAll('[data-en-desc]').forEach(inp=>inp.onchange=()=>{
    const k=inp.dataset.enDesc; DB.expenseNotes[k]={...(DB.expenseNotes[k]||{}),desc:inp.value}; persist();
  });
  document.querySelectorAll('[data-en-memo]').forEach(inp=>inp.onchange=()=>{
    const k=inp.dataset.enMemo; DB.expenseNotes[k]={...(DB.expenseNotes[k]||{}),memo:inp.value}; persist();
  });
  document.querySelectorAll('[data-en-cat]').forEach(s=>s.onchange=()=>{
    const k=s.dataset.enCat; DB.expenseNotes[k]={...(DB.expenseNotes[k]||{}),cat:s.value}; persist();
  });
  document.querySelectorAll('[data-en-note]').forEach(inp=>inp.onchange=()=>{
    const k=inp.dataset.enNote; DB.expenseNotes[k]={...(DB.expenseNotes[k]||{}),note:inp.value}; persist();
  });
  // 수입 메모
  if(!DB.incomeNotes) DB.incomeNotes={};
  document.querySelectorAll('[data-in-memo]').forEach(inp=>inp.onchange=()=>{
    const k=inp.dataset.inMemo; DB.incomeNotes[k]={...(DB.incomeNotes[k]||{}),memo:inp.value}; persist();
  });
}

function maskDesc(s){
  // 공개 모드: 거래명 속 사람 이름(한글 2~4자)을 성만 남기고 가림. 관리자 모드는 원본 표시.
  if(ADMIN) return s;
  return String(s||'').replace(/[가-힣]{2,4}/g, m=>m[0]+'*'.repeat(m.length-1));
}
function incomeDetailHTML(mk){
  const list = (typeof BANK_INCOMES!=='undefined' && BANK_INCOMES[mk])||[];
  if(!list.length) return '<div class="note" style="padding:10px">수입 내역이 없습니다.</div>';
  // 관리비(27,000 배수) 또는 보증금(100,000) 또는 보증금+관리비(100,000+27,000배수)와 맞지 않으면 수기확인 대상
  const clean = a => {
    if(a%27000===0) return true;                 // 관리비 N개월
    if(a===100000) return true;                   // 보증금
    if(a>100000 && (a-100000)%27000===0) return true; // 보증금+관리비
    return false;
  };
  return `<div style="background:#f3f7f4;padding:8px 10px;border-top:2px solid var(--line2)">
    <table class="mono" style="font-size:12.5px">
      <tr><th>날짜</th><th>금액</th><th>거래명</th><th>메모</th></tr>
      ${list.map((e,i)=>{
        const flag=!clean(e.amount);
        const style=flag?'color:#d23;font-weight:700':'';
        const k=expKey(mk,i);
        const note=(DB.incomeNotes&&DB.incomeNotes[k])||{};
        const memo=note.memo||'';
        const memoCell = ADMIN
          ? `<td><input data-in-memo="${k}" value="${esc(memo)}" placeholder="메모" style="width:140px;font-size:12px"></td>`
          : `<td class="note">${esc(maskDesc(memo))||'-'}</td>`;
        return `<tr>
          <td style="${style}">${e.date.slice(5)}</td>
          <td style="${style}">${won(e.amount)}${flag?' ⚠':''}</td>
          <td style="${style}">${esc(maskDesc(e.desc||''))}</td>
          ${memoCell}
        </tr>`;
      }).join('')}
    </table>
    <p class="note" style="margin:6px 0 2px"><span style="color:#d23">빨간 글자</span>는 관리비·보증금과 금액이 맞지 않는 입금입니다(부분납·정정·이자 등). ${ADMIN?'메모 칸에 직접 적어두면 즉시 저장됩니다.':'메모를 수정하려면 관리자 모드로 전환하세요.'}</p>
  </div>`;
}

function seedFromLedger(){
  Object.entries(LEDGER).forEach(([u,d])=>{
    if(!DB.residents[u]) DB.residents[u]={name:'',since:d.effective_from||LEDGER_START};
    // 면제: 사용자가 직접 바꾼 적 없을 때만 관리대장 값으로 채움 (체크 후 새로고침해도 유지)
    if(!DB.residents[u].exemptEdited) DB.residents[u].exempt = d.exempt;
    DB.residents[u].moveIn = d.move_in||'';
    if(DB.residents[u].moveOut) delete DB.residents[u].moveOut;  // 퇴거 표시 사용 안 함(이전 데이터 정리)
    DB.residents[u].since = d.effective_from || DB.residents[u].since || LEDGER_START;
    // 관리대장 성명: 사용자가 직접 수정한 적 없고, 현재 이름이 비어있을 때만 채움
    if(!DB.residents[u].nameEdited && !DB.residents[u].name && d.name) DB.residents[u].name = d.name;
  });
}
function seedBankFinance(){
  // 월별 수입/지출 + 통장 실제 전월잔액/잔액 (통장 거래후잔액 기준)
  Object.entries(BANK_MONTHLY).forEach(([mk,v])=>{
    if(!DB.monthlySummary[mk]) DB.monthlySummary[mk]={};
    DB.monthlySummary[mk].income = v.income;
    DB.monthlySummary[mk].expense = v.expense;
    if(v.prevBal!==undefined) DB.monthlySummary[mk].prevBal = v.prevBal;
    if(v.bal!==undefined) DB.monthlySummary[mk].bal = v.bal;
  });
}

function initFirebase(){
  try{
    if(typeof firebase==='undefined'){ setFbStatus('오프라인(로컬 저장만)'); return; }
    firebase.initializeApp(firebaseConfig);
    const db=firebase.database();
    _fbDoc=db.ref('gangnam/shared');   // 공동 데이터 한 곳에 전체 저장
    let firstSnapshot=true;
    // 실시간 구독: 다른 기기에서 바뀌면 이 화면도 자동 갱신
    _fbDoc.on('value', snap=>{
      const remote=snap.val();
      if(!remote || !remote.data){
        // 원격이 비었을 때만 현재(이 기기) 데이터를 최초 업로드
        _fbReady=true; firstSnapshot=false; persist();
        setFbStatus('연결됨 · 이 기기 데이터로 시작'); return;
      }
      // 원격에 데이터가 있으면 항상 원격을 정답으로 받아 화면 갱신
      try{
        _fbApplying=true;                 // 원격 반영 중엔 되쏘지 않음(무한루프 방지)
        const o=JSON.parse(remote.data);
        Object.keys(DB).forEach(k=>delete DB[k]);
        Object.assign(DB,o);
        try{ localStorage.setItem(STORAGE_KEY, remote.data); }catch(e){}
        seedFromLedger(); seedBankFinance(); allocatePayments(); computeBalances(); renderAll();
      }catch(e){}
      finally{ _fbApplying=false; }
      _fbReady=true; firstSnapshot=false;
      setFbStatus('연결됨 · 여러 기기 실시간 공유');
    }, err=>{
      _fbReady=false;
      setFbStatus('연결 실패(로컬 저장만) — 규칙/주소 확인 필요');
    });
  }catch(e){ setFbStatus('오프라인(로컬 저장만)'); }
}
